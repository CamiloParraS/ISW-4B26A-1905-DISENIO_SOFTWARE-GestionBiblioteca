spring.application.name=biblioteca-api

# Load local environment values from the repository root .env file when present.
spring.config.import=optional:file:.env[.properties]

# ─────────────────────────────────────────────
# Configuración de la aplicación (usa variables de entorno)
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Conexión a MongoDB Atlas
# Configura la variable de entorno SPRING_DATA_MONGODB_URI o el archivo .env
# ─────────────────────────────────────────────
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:biblioteca_db}

# ─────────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────────
server.port=${SERVER_PORT:8080}