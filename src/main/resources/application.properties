spring.application.name=biblioteca-api

# ─────────────────────────────────────────────
# Configuración de la aplicación (usa variables de entorno)
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Conexión a MongoDB Atlas
# Configura las variables de entorno o el archivo .env
# ─────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:biblioteca_db}

# ─────────────────────────────────────────────
# Servidor
# ─────────────────────────────────────────────
server.port=${SERVER_PORT:8080}